<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PHIẾU ĐĂNG KÝ HỌC BƠI</title>

<style>
body{margin:0;background:#fff}
.page{width:794px;margin:auto;font-family:Arial;font-size:11pt}
.header{position:relative}
.header img{width:100%;height:190px}
.header-title{position:absolute;top:24%;left:50%;transform:translate(-50%,-50%);width:90%}
.header-title input{width:100%;border:none;background:transparent;color:#fff;text-align:center;font-weight:bold;font-size:32px;text-transform:uppercase}
.content{padding:0px 32px}
.line{display:inline-block;border-bottom:1px dotted #000;vertical-align:middle}
.line.no-dots{border-bottom:none !important;}
.line input{border:none;width:100%;outline:none;font-size:11pt}
.indent{padding-left:18px; margin:6px 0}
.indent2{padding-left:36px; margin:4px 0}
.row{margin:4px 0;white-space:nowrap}
button{padding:6px 12px;margin:10px}
.chk{transform:scale(1.3); position:relative; top:2px; margin-right:3px}

/* PRINT FIX */
@media print{
  @page{ size: A4; margin: 0; }
  body{ margin:0; -webkit-print-color-adjust: exact; print-color-adjust: exact; }
  button, #selectMaHV { display:none !important; }
  .page{ width:210mm; height:297mm; margin:0; box-sizing:border-box; }
  select{ -webkit-appearance:none !important; appearance:none !important; background:none !important; border:none !important; text-align:center; text-align-last:center; }
}
#tenHLV, #hocVien, #tenPH, #tuVanVien { text-transform: capitalize; }
</style>
</head>

<body>
<div style="position:fixed; top:20px; right:0; transform:translateX(-50%); z-index:999; display: flex; gap: 10px; align-items: center;">
<select id="selectMaHV" onchange="loadStudentData()" style="padding:10px; border-radius:6px; border:1px solid #16a34a; font-weight:bold; background: white; cursor: pointer;">
    <option value="">-- Chọn Mã HV --</option>
</select>

<button onclick="saveData()" id="btnSave" style="padding:10px 24px; border-radius:6px; border:none; background:#16a34a; color:#fff; font-weight:bold; cursor:pointer;">LƯU</button>
<button onclick="exportPDF()" style="padding:10px 24px; border-radius:6px; border:none; background:#0d539f; color:#fff; font-weight:bold; cursor:pointer;">PDF</button>
</div>

<div class="page" id="form-area">
<div class="header">
<img src="https://i.ibb.co/CstGJbrr/bg-header.jpg">
<div class="header-title"><input value="PHIẾU ĐĂNG KÝ HỌC BƠI"></div>
</div>

<div class="content">
<div class="row">
Huấn luyện viên: <span class="line" style="width:220px"><input id="tenHLV" value="Nguyễn Bảo Trung" style="font-weight:bold"></span>
&nbsp;&nbsp;&nbsp; ĐT: <span class="line" style="width:140px"><input id="sdtHLV" value="08.345.357.99" style="font-weight:bold"></span>
&nbsp;&nbsp;&nbsp; Mã số: <span class="line" style="width:50px"><input id="maHLV" value="01" style="font-weight:bold"></span>
</div>

<div class="row">
Học viên: <span class="line" style="width:300px"><input id="hocVien"></span>
&nbsp; ( <input type="checkbox" id="gioiTinhNam" class="chk"> Nam ) ( <input type="checkbox" id="gioiTinhNu" class="chk"> Nữ )
&nbsp;&nbsp;&nbsp;&nbsp; Mã số: <span class="line" style="width:50px"><input id="maHocVien"></span>
</div>
<div class="row">
Ngày tháng năm sinh : <span class="line" style="width:150px; text-align:center"><input type="date" id="ngaySinh" style="text-align:center"></span>
&nbsp;&nbsp; Tuổi: <span class="line" style="width:70px"><input id="tuoi"></span>
</div>

<div class="row">
Họ & Tên ( <input type="checkbox" id="phuHuynhCha" class="chk"> Cha / <input type="checkbox" id="phuHuynhMe" class="chk"> Mẹ ): <span class="line" style="width:250px"><input id="tenPH"></span> &nbsp;&nbsp; ĐT ( Zalo ): <span class="line" style="width:180px"><input id="sdtPH"></span>
</div>
</div>
</div>

<script>
const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbwCn-ywXanKJ7Rh0Wl5A9Nkmau-VRePw1-aHOlU4-evuueMWuS-bJTKR1wzo_KcPw/exec";

const select = document.getElementById("selectMaHV");

// ====== CACHE ======
const CACHE_KEY = "maHV_cache_v1";
const CACHE_TIME = 5 * 60 * 1000; // 5 phút

function setCache(data){
    localStorage.setItem(CACHE_KEY, JSON.stringify({
        time: Date.now(),
        data
    }));
}
function getCache(){
    const raw = localStorage.getItem(CACHE_KEY);
    if(!raw) return null;
    const obj = JSON.parse(raw);
    if(Date.now() - obj.time > CACHE_TIME) return null;
    return obj.data;
}

// ====== LOADING UI ======
function setLoading(state){
    select.innerHTML = state 
        ? '<option>⏳ Đang tải...</option>' 
        : '<option value="">-- Chọn Mã HV --</option>';
}

// ====== LOAD LIST ======
async function fetchMaHVList(retry = 1){
    setLoading(true);

    // dùng cache trước
    const cache = getCache();
    if(cache){
        console.log("⚡ Load từ cache");
        renderSelect(cache);
    }

    try{
        const res = await fetch(SCRIPT_URL + "?action=getList");

        if(!res.ok) throw new Error("HTTP lỗi");

        const text = await res.text();

        if(text === "ok"){
            throw new Error("Script chưa deploy đúng");
        }

        const list = JSON.parse(text);

        if(!Array.isArray(list)){
            throw new Error("Data không hợp lệ");
        }

        setCache(list);
        renderSelect(list);

        console.log("✅ Load danh sách thành công");

    }catch(err){
        console.error("❌ Lỗi load:", err.message);

        if(retry > 0){
            console.log("🔄 Thử lại...");
            setTimeout(()=>fetchMaHVList(retry - 1), 1500);
        }else{
            alert("Không tải được danh sách. Kiểm tra Apps Script!");
        }
    }
}

// ====== RENDER SELECT + SEARCH ======
function renderSelect(list){
    select.innerHTML = '<option value="">-- Chọn Mã HV --</option>';

    list.forEach(ma=>{
        if(!ma) return;
        const opt = document.createElement("option");
        opt.value = ma;
        opt.textContent = ma;
        select.appendChild(opt);
    });

    enableSearch();
}

// ====== SEARCH TRONG SELECT ======
function enableSearch(){
    let search = "";

    select.addEventListener("keydown", e=>{
        if(e.key.length === 1){
            search += e.key.toLowerCase();
        }

        if(e.key === "Backspace"){
            search = search.slice(0,-1);
        }

        const options = [...select.options];

        const found = options.find(opt =>
            opt.value.toLowerCase().includes(search)
        );

        if(found){
            select.value = found.value;
        }

        setTimeout(()=> search = "", 800);
    });
}

// ====== LOAD DETAIL ======
async function loadStudentData(){
    const id = select.value;
    if(!id) return;

    try{
        const res = await fetch(SCRIPT_URL + "?action=getDetail&id=" + id);
        const data = await res.json();

        if(!data || typeof data !== "object"){
            throw new Error("Data rỗng");
        }

        Object.keys(data).forEach(key=>{
            const el = document.getElementById(key);
            if(!el) return;

            if(el.type === "date" && data[key]){
                el.value = new Date(data[key]).toISOString().split('T')[0];
            }
            else if(el.classList.contains('money')){
                el.value = formatNumber(data[key]);
            }
            else{
                el.value = data[key];
            }
        });

        // checkbox
        document.getElementById("gioiTinhNam").checked = (data.gioiTinh === "Nam");
        document.getElementById("gioiTinhNu").checked = (data.gioiTinh === "Nữ");
        document.getElementById("phuHuynhCha").checked = (data.loaiPH === "Cha");
        document.getElementById("phuHuynhMe").checked = (data.loaiPH === "Mẹ");

    }catch(err){
        console.error("❌ Lỗi load chi tiết:", err.message);
        alert("Không load được dữ liệu học viên");
    }
}

// ====== FORMAT ======
function formatNumber(x){
    return x 
        ? x.toString().replace(/\D/g,'').replace(/\B(?=(\d{3})+(?!\d))/g,'.')
        : "";
}

// ====== INIT ======
window.addEventListener("DOMContentLoaded", ()=>{
    fetchMaHVList();

    document.querySelectorAll('.money').forEach(input=>{
        input.value = formatNumber(input.value);
        input.addEventListener('input', function(){
            this.value = formatNumber(this.value);
        });
    });
});

// ====== SAVE ======
async function saveData(){
    const btn = document.getElementById("btnSave");
    btn.disabled = true;
    btn.innerText = "Đang lưu...";

    const data = {
        maHocVien: document.getElementById("maHocVien").value,
        hocVien: document.getElementById("hocVien").value,
        loaiBoi: document.getElementById("loaiBoi").value,
        gioiTinh: document.getElementById("gioiTinhNam").checked ? "Nam" : "Nữ",
        tenPH: document.getElementById("tenPH").value,
        sdtPH: document.getElementById("sdtPH").value,
        time: new Date().toISOString()
    };

    try{
        await fetch(SCRIPT_URL, {
            method:"POST",
            mode:"no-cors",
            body: JSON.stringify(data)
        });

        alert("✅ Đã lưu");
        fetchMaHVList();

    }catch(e){
        alert("❌ Lỗi lưu");
    }

    btn.disabled = false;
    btn.innerText = "LƯU";
}

function exportPDF(){ window.print(); }
</script>
</body>
</html>
