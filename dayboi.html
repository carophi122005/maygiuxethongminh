<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PHIẾU ĐĂNG KÝ HỌC BƠI</title>
<style>
    body{margin:0;background:#fff;font-family:Arial;font-size:11pt}
    .page{width:794px;margin:auto}
    .header img{width:100%;height:190px}
    .content{padding:0px 32px}
    .line{display:inline-block;border-bottom:1px dotted #000;vertical-align:middle}
    .line input{border:none;width:100%;outline:none;font-size:11pt}
    .row{margin:4px 0;white-space:nowrap}
    .chk{transform:scale(1.3); position:relative; top:2px; margin-right:3px}
    button{padding:10px 20px; cursor:pointer; border-radius:5px; border:none; font-weight:bold}
    @media print{ button, #selectMaHV { display:none !important; } }
</style>
</head>
<body>

<div style="position:fixed; top:10px; right:10px; z-index:1000; background:#f0f0f0; padding:10px; border-radius:8px; display:flex; gap:10px">
    <select id="selectMaHV" onchange="loadStudentData()" style="padding:5px; font-weight:bold">
        <option value="">-- Chọn Mã HV --</option>
    </select>
    <button onclick="saveData()" style="background:#16a34a; color:white">LƯU</button>
    <button onclick="window.print()" style="background:#0d539f; color:white">PDF</button>
</div>

<div class="page" id="form-area">
    <div class="header" style="position:relative">
        <img src="https://i.ibb.co/CstGJbrr/bg-header.jpg">
        <div style="position:absolute; top:40%; width:100%; text-align:center">
            <h1 style="color:white; margin:0; font-size:32px">PHIẾU ĐĂNG KÝ HỌC BƠI</h1>
        </div>
    </div>

    <div class="content">
        <div class="row">
            Huấn luyện viên: <span class="line" style="width:200px"><input id="tenHLV" value="Nguyễn Bảo Trung"></span>
            Mã số: <span class="line" style="width:50px"><input id="maHLV" value="01"></span>
        </div>
        <div class="row">
            Học viên: <span class="line" style="width:250px"><input id="hocVien"></span>
            Mã số: <span class="line" style="width:80px"><input id="maHocVien"></span>
        </div>
        </div>
</div>

<script>
// DÁN LINK MỚI (TỪ BƯỚC 2) VÀO ĐÂY
const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbwCn-ywXanKJ7Rh0Wl5A9Nkmau-VRePw1-aHOlU4-evuueMWuS-bJTKR1wzo_KcPw/exec";

async function fetchMaHVList() {
    try {
        const response = await fetch(SCRIPT_URL + "?action=getList");
        const rawData = await response.text(); // Đọc dạng text trước để kiểm tra

        if (rawData === "OK" || rawData === "ok") {
            console.warn("Cảnh báo: Script vẫn trả về 'OK'. Vui lòng Deploy bản mới nhất trên Google Script!");
            return;
        }

        const list = JSON.parse(rawData); // Chỉ parse khi không phải là "OK"
        const select = document.getElementById("selectMaHV");
        select.innerHTML = '<option value="">-- Chọn Mã HV --</option>';
        
        list.forEach(ma => {
            let opt = document.createElement("option");
            opt.value = ma;
            opt.textContent = ma;
            select.appendChild(opt);
        });
    } catch (err) {
        console.error("Lỗi danh sách:", err);
    }
}

async function loadStudentData() {
    const id = document.getElementById("selectMaHV").value;
    if (!id) return;

    try {
        const res = await fetch(SCRIPT_URL + "?action=getDetail&id=" + id);
        const data = await res.json();
        if (data) {
            // Tự động điền các ô dựa trên ID trùng với tiêu đề cột
            Object.keys(data).forEach(key => {
                const el = document.getElementById(key);
                if (el) el.value = data[key];
            });
        }
    } catch (e) { console.error("Lỗi load dữ liệu:", e); }
}

// Khởi tạo khi mở trang
window.onload = () => {
    fetchMaHVList();
    // Lấy mã ID tự động cho học viên mới
    fetch(SCRIPT_URL).then(r => r.text()).then(id => {
        if(id.length < 10) document.getElementById("maHocVien").value = id;
    });
};

async function saveData() {
    // Logic lưu dữ liệu của bạn...
    alert("Chức năng lưu đang kết nối...");
}
</script>
</body>
</html>
